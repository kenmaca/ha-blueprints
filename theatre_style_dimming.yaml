#
# Dims lights when media is played and reverts back to previous brightness when stopped/paused

blueprint:
  name: Theatre-style Dimming
  description: Dims lights when media is played and reverts back to previous brightness when stopped/paused
  domain: automation
  input:
    room_light:
      name: Light
      selector:
        entity:
          domain: light

    media_player:
      name: Media Player
      selector:
        entity:
          domain:
            - media_player
            - binary_sensor

    dimmed_brightness:
      name: Dimmed Brightness
      default: 10
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

    brightness_threshold:
      name: Brightness Threshold
      description: Only dim if the current light brightness is above this level. Prevents re-dimming an already-dim light.
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider

    ttd:
      name: Time-to-dim
      description: Delay after media starts playing before dimming begins.
      default: 3
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: "seconds"
          mode: slider

    ttr:
      name: Time-to-reset
      description: Delay after media stops/pauses before restoring brightness. Smooths over brief pauses and buffering.
      default: 10
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: "seconds"
          mode: slider

    dim_duration:
      name: Dim Duration
      description: Transition time for both dim and restore.
      default: 2
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: "seconds"
          mode: slider

mode: single

variables:
  room_light: !input room_light
  brightness_threshold: !input brightness_threshold

trigger:
  - platform: state
    entity_id: !input media_player
    to: "playing"
    for:
      seconds: !input ttd
  - platform: state
    entity_id: !input media_player
    to: "buffering"
    for:
      seconds: !input ttd
  - platform: state
    entity_id: !input media_player
    to: "on"
    for:
      seconds: !input ttd

condition:
  - condition: template
    value_template: >
      {{ is_state(room_light, 'on')
         and (state_attr(room_light, 'brightness') | int(0))
             > (brightness_threshold * 255 / 100) }}

action:
  - service: scene.create
    data:
      scene_id: "persistence_{{ room_light.split('.')[1] }}"
      snapshot_entities: !input room_light
  - service: light.turn_on
    data:
      brightness_pct: !input dimmed_brightness
      transition: !input dim_duration
    target:
      entity_id: !input room_light
  - delay:
      seconds: !input dim_duration
  - wait_for_trigger:
      - platform: state
        entity_id: !input media_player
        to: "paused"
        for:
          seconds: !input ttr
      - platform: state
        entity_id: !input media_player
        to: "idle"
        for:
          seconds: !input ttr
      - platform: state
        entity_id: !input media_player
        to: "off"
        for:
          seconds: !input ttr
      - platform: state
        entity_id: !input media_player
        to: "unavailable"
        for:
          seconds: !input ttr
      - platform: state
        entity_id: !input room_light
        to: "off"
  - if:
      - condition: template
        value_template: "{{ wait.trigger.to_state.entity_id != room_light }}"
    then:
      - service: scene.turn_on
        data:
          entity_id: "scene.persistence_{{ room_light.split('.')[1] }}"
          transition: !input dim_duration
