blueprint:
  name: Motion-activated Light with sun condition
  description: Turn on a light when motion is detected and sunset.
  domain: automation
  input:
    motion_entity:
      name: Motion Sensor
      selector:
        entity:
    light_target:
      name: Light
      selector:
        entity:
    no_motion_wait:
      name: Wait time
      description: Time to leave the light on after last motion is detected.
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds
          
    sunset_offset:
      name: Offset to turn on lights
      description: Define offset to sunset
      default: 60
      selector:
        number:
          min: 0
          max: 240
          unit_of_measurement: minutes
          
    sunrise_offset:
      name: Offset to turn off lights
      description: Define offset to sunrise
      default: 45
      selector:
        number:
          min: 0
          max: 240
          unit_of_measurement: minutes

# If motion is detected within the delay,
# we restart the script.
mode: restart
max_exceeded: silent

trigger:
  platform: state
  entity_id: !input motion_entity
  from: "off"
  to: "on"
  
condition:
  - condition: or
    conditions:
    - condition: sun
      after: sunset
      after_offset: !input sunset_offset
    - condition: sun
      before: sunrise
      before_offset: !input sunrise_offset

action:
  - service: homeassistant.turn_on
    entity_id: !input light_target
  - alias: "Wait until there is no motion from device (skip if already off due to sensor chatter)"
    if:
      - condition: state
        entity_id: !input motion_entity
        state: "on"
    then:
      - wait_for_trigger:
          platform: state
          entity_id: !input motion_entity
          from: "on"
          to: "off"
  - delay: !input no_motion_wait
  - service: homeassistant.turn_off
    entity_id: !input light_target
