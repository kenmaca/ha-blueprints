#
# Auto-locks the door after it's been closed (or the lock left unlocked) for some time,
# and optionally auto-unlocks when the door is held open with the deadbolt extended.
#
# Designed to be friendly to Yale's flaky/rate-limited cloud:
#   * mode: single (no in-flight cancellation, no duplicate API calls)
#   * idempotent actions — duplicate triggers no-op safely
#   * each lock/unlock is verified by waiting for the entity state to confirm
#   * a single retry after a backoff handles the "Yale didn't respond" case

blueprint:
  name: Automated lock control
  description: >-
    Auto-locks the door when it's been closed (or the lock left unlocked) for the
    configured time. Optionally auto-unlocks when the door is held open with the
    deadbolt extended, to prevent jamming. Each command is verified by waiting for
    the lock state to confirm, with a single retry on failure — written to play
    nicely with rate-limited cloud-backed locks (e.g. Yale).
  domain: automation
  source_url: https://github.com/kenmaca/ha-blueprints/blob/main/automated_lock_control.yaml
  author: kenmaca
  input:
    door:
      name: Door
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - door
            - garage_door
            - opening
            - window

    lock:
      name: Lock
      selector:
        entity:
          domain: lock

    ttl:
      name: Time-to-lock
      description: Seconds the door must stay closed (or the lock left unlocked) before auto-locking.
      default: 60
      selector:
        number:
          min: 1
          max: 600
          step: 1
          unit_of_measurement: 'seconds'
          mode: slider

    ttu:
      name: Time-to-unlock
      description: Seconds the lock can remain locked while the door is open before auto-unlocking to prevent the bolt from jamming.
      default: 120
      selector:
        number:
          min: 1
          max: 600
          step: 1
          unit_of_measurement: 'seconds'
          mode: slider

    verify_timeout:
      name: Verification timeout
      description: >-
        Seconds to wait for the lock to confirm the new state after a command is
        issued. Yale can take 30s+ under load — keep this generous.
      default: 45
      selector:
        number:
          min: 5
          max: 180
          step: 5
          unit_of_measurement: 'seconds'
          mode: slider

    retry_backoff:
      name: Retry backoff
      description: >-
        Seconds to wait before retrying once if the lock didn't confirm. Long
        enough to clear most rate-limit windows, short enough that the door
        doesn't sit in the wrong state for too long.
      default: 60
      selector:
        number:
          min: 5
          max: 600
          step: 5
          unit_of_measurement: 'seconds'
          mode: slider

    enable_auto_lock:
      name: Enable auto-lock
      description: Automatically lock the door when it's been closed (or the lock left unlocked) for the configured time.
      default: true
      selector:
        boolean:

    enable_auto_unlock:
      name: Enable auto-unlock
      description: Automatically unlock when the door is open and the lock has been engaged for too long, to prevent jamming.
      default: true
      selector:
        boolean:

# Surface inputs to Jinja so action templates and wait_templates can reference them.
# Without this, `!input` values aren't visible inside `{{ ... }}`.
variables:
  enable_auto_lock: !input enable_auto_lock
  enable_auto_unlock: !input enable_auto_unlock
  door_entity: !input door
  lock_entity: !input lock
  verify_timeout: !input verify_timeout
  retry_backoff: !input retry_backoff

# `mode: single` is load-bearing here. With `mode: restart`, a second trigger that
# arrived while a `lock.lock` call was in-flight would cancel the HA task — but the
# request was usually already on its way to Yale's cloud, and we'd issue a second
# request on top of it. Yale would respond with error 560 / TimeoutError. With
# single, the first run wins, runs to completion, and any near-simultaneous
# triggers are dropped silently. The action is idempotent (it inspects current
# state before doing anything), so dropping duplicates is safe.
mode: single
max_exceeded: silent

trigger:
  # Lock has been locked for ttu while the door is open — bolt-jam risk.
  - platform: state
    id: lock_locked_for_ttu
    entity_id: !input lock
    to: 'locked'
    not_from:
      - 'unavailable'
      - 'unknown'
    for:
      seconds: !input ttu
  # Door has been open for ttu while the lock is locked — also a jam risk.
  - platform: state
    id: door_open_for_ttu
    entity_id: !input door
    to: 'on'
    not_from:
      - 'unavailable'
      - 'unknown'
    for:
      seconds: !input ttu
  # Door has been closed for ttl — auto-lock candidate.
  - platform: state
    id: door_closed_for_ttl
    entity_id: !input door
    to: 'off'
    not_from:
      - 'unavailable'
      - 'unknown'
    for:
      seconds: !input ttl
  # Lock has been unlocked for ttl — auto-lock candidate (covers the "unlocked but
  # never opened the door" case).
  - platform: state
    id: lock_unlocked_for_ttl
    entity_id: !input lock
    to: 'unlocked'
    not_from:
      - 'unavailable'
      - 'unknown'
    for:
      seconds: !input ttl

# Bail out if either entity is degraded — no point acting on stale data.
condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input door
        state:
          - 'unavailable'
          - 'unknown'
      - condition: state
        entity_id: !input lock
        state:
          - 'unavailable'
          - 'unknown'

action:
  - choose:
    - alias: 'Auto-unlock — door open while locked, retract the bolt'
      conditions:
        - condition: template
          value_template: "{{ enable_auto_unlock }}"
        - condition: state
          entity_id: !input door
          state: 'on'
        - condition: state
          entity_id: !input lock
          state: 'locked'
      sequence:
        - alias: 'Issue unlock'
          action: lock.unlock
          target:
            entity_id: !input lock
          # Yale sometimes raises 560/TimeoutError but the lock did move — let
          # the wait_template below decide based on actual state, not the call.
          continue_on_error: true
        - alias: 'Wait for the lock to confirm unlocked'
          wait_template: "{{ is_state(lock_entity, 'unlocked') }}"
          timeout:
            seconds: !input verify_timeout
          continue_on_timeout: true
        - alias: 'Retry once if Yale didn''t respond and the door is still open'
          if:
            - condition: template
              value_template: >-
                {{ is_state(door_entity, 'on') and is_state(lock_entity, 'locked') }}
          then:
            - delay:
                seconds: !input retry_backoff
            - alias: 'Re-issue unlock'
              action: lock.unlock
              target:
                entity_id: !input lock
              continue_on_error: true
            - wait_template: "{{ is_state(lock_entity, 'unlocked') }}"
              timeout:
                seconds: !input verify_timeout
              continue_on_timeout: true

    - alias: 'Auto-lock — door closed and lock left unlocked'
      conditions:
        - condition: template
          value_template: "{{ enable_auto_lock }}"
        - condition: state
          entity_id: !input door
          state: 'off'
        - condition: state
          entity_id: !input lock
          state: 'unlocked'
      sequence:
        - alias: 'Issue lock'
          action: lock.lock
          target:
            entity_id: !input lock
          continue_on_error: true
        - alias: 'Wait for the lock to confirm locked'
          wait_template: "{{ is_state(lock_entity, 'locked') }}"
          timeout:
            seconds: !input verify_timeout
          continue_on_timeout: true
        - alias: 'Retry once if Yale didn''t respond and the door is still closed'
          if:
            - condition: template
              value_template: >-
                {{ is_state(door_entity, 'off') and is_state(lock_entity, 'unlocked') }}
          then:
            - delay:
                seconds: !input retry_backoff
            - alias: 'Re-issue lock'
              action: lock.lock
              target:
                entity_id: !input lock
              continue_on_error: true
            - wait_template: "{{ is_state(lock_entity, 'locked') }}"
              timeout:
                seconds: !input verify_timeout
              continue_on_timeout: true
